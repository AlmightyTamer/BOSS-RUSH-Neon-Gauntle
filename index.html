<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS RUSH — Neon Gauntlet: Eclipse Saga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    user-select: none;
  }

  #wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 900px;
    padding: 6px 0;
  }

  #game-title {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 30px #00fff7;
  }

  #level-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #ff6aff;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ff6aff;
  }

  #canvas-container {
    position: relative;
    width: 900px;
    height: 560px;
    border: 1px solid #1a1a2e;
    box-shadow: 0 0 0 1px #00fff730, 0 0 40px #00fff710, inset 0 0 60px #00001a;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 900px;
    height: 560px;
  }

  #canvas-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #controls-bar {
    display: flex;
    gap: 24px;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #ffffff50;
    letter-spacing: 2px;
  }

  .ctrl-key {
    display: inline-block;
    background: #ffffff0d;
    border: 1px solid #ffffff20;
    padding: 2px 6px;
    border-radius: 3px;
    color: #ffffffaa;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="title-bar">
    <span id="game-title">BOSS RUSH</span>
    <span id="level-label">NEON GAUNTLET: ECLIPSE SAGA</span>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas" width="900" height="560"></canvas>
  </div>
  <div id="controls-bar">
    <span><span class="ctrl-key">W A S D</span> MOVE</span>
    <span><span class="ctrl-key">F</span> SHOOT</span>
    <span><span class="ctrl-key">H</span> HEAL ×7</span>
    <span><span class="ctrl-key">R</span> RESTART</span>
  </div>
</div>

<script>
// =============================================================================
//  BOSS RUSH — Neon Gauntlet: Eclipse Saga (7 Levels + Cinematic Story)
// =============================================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 560;

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {}, justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.key]) justPressed[e.key] = true;
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
function keyDown(k) { return !!keys[k]; }
function keyJust(k) { const v = !!justPressed[k]; justPressed[k] = false; return v; }

// ── Utilities ─────────────────────────────────────────────────────────────────
const lerp    = (a,b,t) => a + (b-a)*t;
const clamp   = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const rand    = (lo,hi) => lo + Math.random()*(hi-lo);
const randInt = (lo,hi) => Math.floor(rand(lo,hi+1));
const ang     = (a,b) => Math.atan2(b.y-a.y, b.x-a.x);
const easeOut = t => 1 - Math.pow(1-t, 3);
const easeIn  = t => t*t*t;
const easeInOut = t => t<.5 ? easeIn(t*2)*.5 : easeOut((t-.5)*2)*.5+.5;

// ── Canvas helpers ────────────────────────────────────────────────────────────
function glow(color, blur=10)  { ctx.shadowColor=color; ctx.shadowBlur=blur; }
function noGlow()              { ctx.shadowBlur=0; }
function withAlpha(a, fn)      { const prev=ctx.globalAlpha; ctx.globalAlpha=clamp(a,0,1); fn(); ctx.globalAlpha=prev; }

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count=8, speed=3, upward=false) {
  for (let i=0; i<count; i++) {
    const a = upward ? rand(-Math.PI, 0) : rand(0, Math.PI*2);
    const s = rand(speed*0.4, speed);
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:rand(0.018,0.055), r:rand(2,5), color
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=p.decay; p.r*=0.97;
  }
}
function drawParticles() {
  for (const p of particles) {
    withAlpha(p.life, () => {
      glow(p.color,8); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
  }
  noGlow();
}

// ── Screen shake ──────────────────────────────────────────────────────────────
let shakeAmt = 0;
function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }

// ── Flash ─────────────────────────────────────────────────────────────────────
let flashTimer=0, flashColor='#fff';
function flash(c='#fff', d=8) { flashTimer=d; flashColor=c; }

// ── Camera ────────────────────────────────────────────────────────────────────
let cam = {x:0, y:0, zoom:1, shakeX:0, shakeY:0};

// ── Bullets ───────────────────────────────────────────────────────────────────
function makeBullet(x,y,vx,vy,color,r=5,dmg=10,owner='player') {
  return {x,y,vx,vy,color,r,dmg,owner,life:1};
}
function moveBullets(arr) {
  for (const b of arr) { b.x+=b.vx; b.y+=b.vy; }
  return arr.filter(b => b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20&&b.life>0);
}
function drawBullets(arr) {
  for (const b of arr) {
    glow(b.color,14); ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    withAlpha(0.3, () => {
      ctx.beginPath(); ctx.arc(b.x-b.vx*1.5, b.y-b.vy*1.5, b.r*0.7, 0, Math.PI*2); ctx.fill();
    });
  }
  noGlow();
}

// ── Health Bar ────────────────────────────────────────────────────────────────
function drawHealthBar(x,y,w,h,pct,label,color) {
  ctx.fillStyle='#0a0a14'; ctx.strokeStyle=color+'50'; ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  glow(color,8); ctx.fillStyle=color;
  ctx.fillRect(x+1,y+1,(w-2)*clamp(pct,0,1),h-2);
  noGlow();
  ctx.fillStyle='#fff'; ctx.font='bold 10px Orbitron';
  ctx.textAlign='left'; ctx.fillText(label,x,y-6);
}

// ── Background ────────────────────────────────────────────────────────────────
let bgOffset=0;
function drawBackground() {
  ctx.save();
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(cam.x, cam.y);
  ctx.fillStyle='#020208'; ctx.fillRect(-50,-50,W+100,H+100);
  ctx.strokeStyle='#00fff708'; ctx.lineWidth=1;
  const gs=40, off=bgOffset%gs;
  for (let x=-gs+off; x<W+100; x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H+100); ctx.stroke(); }
  for (let y=-gs+off; y<H+100; y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W+100,y); ctx.stroke(); }
  bgOffset+=0.3;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'#000000cc');
  ctx.fillStyle=vg; ctx.fillRect(-50,-50,W+100,H+100);
  ctx.restore();
}

// =============================================================================
//  PLAYER (HARDER: Less HP, faster cooldowns)
// =============================================================================
const HEAL_PER_LEVEL = 7;
const HEAL_AMOUNT    = 25;

const player = {
  x:W/2, y:H-100, w:20, h:24, speed:4.2,
  hp:80, maxHp:80,  // Reduced max HP
  bullets:[], shootCooldown:0, shootRate:11,  // Faster shooting
  iframes:0, dead:false, trail:[],
  healCharges: HEAL_PER_LEVEL,
  healCooldown: 0,
  healAnim: 0,
  healPopTimer: 0,
  healPopText: ''
};

function resetPlayer() {
  player.x=W/2; player.y=H-100;
  player.hp=80; player.maxHp=80;
  player.bullets=[]; player.shootCooldown=0;
  player.iframes=0; player.dead=false; player.trail=[];
  player.healCharges=HEAL_PER_LEVEL;
  player.healCooldown=0; player.healAnim=0;
  player.healPopTimer=0;
}

function updatePlayer() {
  if (player.dead) return;

  let moved=false;
  if (keyDown('w')||keyDown('W')||keyDown('ArrowUp'))    { player.y-=player.speed; moved=true; }
  if (keyDown('s')||keyDown('S')||keyDown('ArrowDown'))  { player.y+=player.speed; moved=true; }
  if (keyDown('a')||keyDown('A')||keyDown('ArrowLeft'))  { player.x-=player.speed; moved=true; }
  if (keyDown('d')||keyDown('D')||keyDown('ArrowRight')) { player.x+=player.speed; moved=true; }
  player.x=clamp(player.x,player.w,W-player.w);
  player.y=clamp(player.y,player.h,H-player.h);

  if (moved) player.trail.push({x:player.x,y:player.y,a:1});
  if (player.trail.length>12) player.trail.shift();
  player.trail.forEach(t=>t.a-=0.08);
  player.trail=player.trail.filter(t=>t.a>0);

  // Triple shot from level 2
  if (player.shootCooldown>0) player.shootCooldown--;
  if ((keyDown('f')||keyDown('F')) && player.shootCooldown===0) {
    const bx=player.x, by=player.y-player.h;
    player.bullets.push(makeBullet(bx,by,0,-9.5,'#00fff7',4,12,'player'));
    if (currentLevel>=2) {
      player.bullets.push(makeBullet(bx,by,-2,-8.8,'#00fff7',3,10,'player'));
      player.bullets.push(makeBullet(bx,by, 2,-8.8,'#00fff7',3,10,'player'));
    }
    player.shootCooldown=player.shootRate;
    spawnParticles(bx,by,'#00fff7',4,2);
  }

  // Heal
  if (player.healCooldown>0) player.healCooldown--;
  if ((keyJust('h')||keyJust('H')) && player.healCooldown===0) {
    if (player.healCharges>0 && player.hp<player.maxHp) {
      const gained=Math.min(HEAL_AMOUNT, player.maxHp-player.hp);
      player.hp=Math.min(player.maxHp, player.hp+HEAL_AMOUNT);
      player.healCharges--;
      player.healAnim=70;
      player.healCooldown=25;
      player.healPopTimer=90;
      player.healPopText=`+${gained} HP`;
      flash('#00ff88',4); shake(3);
      spawnParticles(player.x,player.y,'#00ff88',24,4,true);
    } else if (player.healCharges===0) {
      player.healPopTimer=60;
      player.healPopText='NO HEALS LEFT';
      player.healCooldown=20;
      flash('#ff4444',3);
    } else if (player.hp>=player.maxHp) {
      player.healPopTimer=60;
      player.healPopText='ALREADY FULL';
      player.healCooldown=20;
    }
  }
  if (player.healAnim>0) player.healAnim--;
  if (player.healPopTimer>0) player.healPopTimer--;

  player.bullets=moveBullets(player.bullets);
  if (player.iframes>0) player.iframes--;
}

function drawPlayer() {
  ctx.save();
  ctx.translate(-cam.x, -cam.y);
  ctx.scale(cam.zoom, cam.zoom);
  
  // trail
  for (const t of player.trail) {
    withAlpha(t.a*0.28, () => {
      ctx.fillStyle='#00fff7';
      ctx.fillRect(t.x-player.w*0.6, t.y-player.h*0.6, player.w*1.2, player.h*1.2);
    });
  }
  if (player.dead) { drawBullets(player.bullets); ctx.restore(); return; }
  const blink = player.iframes>0 && Math.floor(player.iframes/3)%2===0;
  if (blink) ctx.globalAlpha=0.35;

  const px=player.x, py=player.y;

  // Heal pulse rings
  if (player.healAnim>0) {
    for (let ring=0; ring<2; ring++) {
      const t = 1-((player.healAnim-ring*15)/70);
      if (t<0||t>1) continue;
      withAlpha((1-t)*0.8, () => {
        glow('#00ff88',20);
        ctx.strokeStyle='#00ff88'; ctx.lineWidth=2+ring;
        ctx.beginPath(); ctx.arc(px,py,t*70,0,Math.PI*2); ctx.stroke();
      });
    }
  }

  // Ship body
  glow('#00fff7',20); ctx.fillStyle='#00fff7';
  ctx.beginPath();
  ctx.moveTo(px, py-player.h);
  ctx.lineTo(px-player.w*0.7, py+player.h*0.5);
  ctx.lineTo(px-player.w*0.3, py+player.h*0.2);
  ctx.lineTo(px, py+player.h*0.5);
  ctx.lineTo(px+player.w*0.3, py+player.h*0.2);
  ctx.lineTo(px+player.w*0.7, py+player.h*0.5);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle='#001a1a';
  ctx.beginPath(); ctx.ellipse(px,py-player.h*0.3,6,8,0,0,Math.PI*2); ctx.fill();

  // Engine glow
  glow('#ff6aff',16); ctx.fillStyle='#ff6aff';
  ctx.beginPath(); ctx.ellipse(px,py+player.h*0.55,5,3,0,0,Math.PI*2); ctx.fill();
  noGlow();

  // Heal popup
  if (player.healPopTimer>0) {
    const t=player.healPopTimer/90;
    const rise=(1-t)*30;
    const isErr=player.healPopText.startsWith('NO')||player.healPopText.startsWith('ALREADY');
    withAlpha(t, () => {
      glow(isErr?'#ff4444':'#00ff88',12);
      ctx.fillStyle=isErr?'#ff6666':'#00ff88';
      ctx.font='bold 13px Orbitron';
      ctx.textAlign='center';
      ctx.fillText(player.healPopText, px, py-player.h-20-rise);
    });
  }

  drawBullets(player.bullets);
  ctx.restore();
}

// =============================================================================
//  7 BOSSES (MUCH HARDER)
// =============================================================================
const BOSS_DEFS = [
  { name:'THE SENTINEL', color:'#ff4444', accentColor:'#ff8888',
    baseHp:350, w:40, h:36, desc:'Relentless guardian. Pattern perfected.' },  // +75% HP
  { name:'THE HYDRA',    color:'#ff9900', accentColor:'#ffcc44',
    baseHp:550, w:50, h:42, desc:'Seven heads. Perfect coordination.' },     // +72% HP
  { name:'THE PHANTOM',  color:'#cc44ff', accentColor:'#ff88ff',
    baseHp:750, w:44, h:44, desc:'Phase through reality itself.' },          // +67% HP
  { name:'THE COLOSSUS', color:'#22ccff', accentColor:'#88eeff',
    baseHp:950, w:60, h:52, desc:'Multi-shield fortress. Unbreakable.' },    // +58% HP
  { name:'THE VOID',     color:'#ff44aa', accentColor:'#ffffff',
    baseHp:1400, w:56, h:56, desc:'Reality eater. Hunger eternal.' },        // +56% HP
  { name:'THE HERALD',   color:'#44ff44', accentColor:'#88ff88',
    baseHp:1800, w:64, h:64, desc:'Eclipse prophet. Judgment falls.' },
  { name:'ECLIPSE CORE', color:'#ffff44', accentColor:'#ffffff',
    baseHp:2500, w:80, h:80, desc:'Singularity heart. END OF ALL.' },
];

// EPIC MOVIE CUTSCENES WITH CAMERA CUTS
const CUTSCENES = [
  // Level 1 - THE WARNING
  [
    { speaker:'ALERT', text:'CRITICAL BREACH — Sector NEON-7', color:'#ff8888', camera: 'wide' },
    { speaker:'SENTINEL', text:'Intruder detected. Threat assessment: INSIGNIFICANT.', color:'#ff4444', camera: 'boss_close' },
    { speaker:'SENTINEL', text:'Protocol: ELIMINATION.', color:'#ff4444', camera: 'boss_close' },
    { speaker:'PILOT', text:'Bring it.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 2 - THE MULTIPLICATION
  [
    { speaker:'COMMS', text:'Multiple signatures... they\'re multiplying!', color:'#ffcc44', camera: 'wide' },
    { speaker:'HYDRA', text:'One fell. We are legion. You remain singular.', color:'#ff9900', camera: 'boss_close' },
    { speaker:'HYDRA', text:'We have your patterns. We have evolved.', color:'#ff9900', camera: 'boss_close' },
    { speaker:'PILOT', text:'Then evolve to survive THIS.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 3 - THE VANISHING
  [
    { speaker:'SENSORS', text:'Target lost. Radar failure. It\'s... gone.', color:'#ff88ff', camera: 'wide' },
    { speaker:'PHANTOM', text:'Hehehe... shadows dance where light fails...', color:'#cc44ff', camera: 'boss_close' },
    { speaker:'PHANTOM', text:'Exhaust yourself chasing ghosts, little spark.', color:'#cc44ff', camera: 'boss_close' },
    { speaker:'PILOT', text:'Ghosts bleed neon. Let\'s test that theory.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 4 - THE FORTRESS AWAKENS
  [
    { speaker:'TACTICAL', text:'That\'s no ship. That\'s a WAR MACHINE.', color:'#88eeff', camera: 'wide' },
    { speaker:'COLOSSUS', text:'THREAT LEVEL: NONEXISTENT.', color:'#22ccff', camera: 'boss_close' },
    { speaker:'COLOSSUS', text:'SHIELD MATRIX ACTIVE. EXTERMINATION PROTOCOL ENGAGED.', color:'#22ccff', camera: 'boss_close' },
    { speaker:'PILOT', text:'Every fortress crumbles. Yours will too.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 5 - VOID STAREDOWN
  [
    { speaker:'COMMS', text:'...telemetry gone. You\'re alone now, pilot.', color:'#ff88cc', camera: 'wide' },
    { speaker:'VOID', text:'Through fire, through ruin, through lesser gods...', color:'#ff44aa', camera: 'boss_close' },
    { speaker:'VOID', text:'You persist. Admirable. Futile. I AM the end.', color:'#ff44aa', camera: 'boss_close' },
    { speaker:'PILOT', text:'Ends can be rewritten.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 6 - THE PROPHECY
  [
    { speaker:'COSMIC', text:'Eclipse approaches. Reality fractures...', color:'#88ff88', camera: 'wide_pulse' },
    { speaker:'HERALD', text:'I foretold your path. Every death. Every victory.', color:'#44ff44', camera: 'boss_orbit' },
    { speaker:'HERALD', text:'Witness judgment. The Core awakens.', color:'#44ff44', camera: 'boss_orbit' },
    { speaker:'PILOT', text:'Prophecies break when you punch them.', color:'#00fff7', camera: 'player_close' },
  ],
  // Level 7 - THE FINAL COUNTDOWN
  [
    { speaker:'ALERT', text:'SINGULARITY DETECTED. EVACUATE NEON-7.', color:'#ffff88', camera: 'wide_chaos' },
    { speaker:'CORE', text:'You destroyed my shells. Now face my heart.', color:'#ffff44', camera: 'boss_massive' },
    { speaker:'CORE', text:'Time ends. Light ends. YOU end.', color:'#ffff44', camera: 'boss_massive' },
    { speaker:'PILOT', text:'Not today.', color:'#00fff7', camera: 'player_epic' },
  ],
];

let boss = null;

function createBoss(level) {
  const def = BOSS_DEFS[Math.min(level-1, BOSS_DEFS.length-1)];
  return {
    ...def, x:W/2, y:140,
    hp:def.baseHp, maxHp:def.baseHp,
    bullets:[], invulnTimer:0,
    phaseTimer:0, moveTimer:0, shootTimer:0,
    targetX:W/2, targetY:120,
    angle:0, pulseTimer:0,
    shielded:false, shieldHp:0, shieldRecharge:0,
    enraged:false, berserk:false,
    teleportCooldown:0,
    chargeVx:0, chargeVy:0, charging:false, chargeLife:0,
    homingBullets:[], splitTimer:0,
    level, dead:false,
  };
}

// HARDER SHOOTING PATTERNS
function bossShootAt(b, tx, ty, speed, color, count=1, spread=0, dmg=18) {  // Higher base damage
  const a=Math.atan2(ty-b.y, tx-b.x);
  for (let i=0;i<count;i++) {
    const aa=a+(i-(count-1)/2)*spread;
    b.bullets.push(makeBullet(b.x,b.y,Math.cos(aa)*speed,Math.sin(aa)*speed,color,5,dmg,'boss'));
  }
  spawnParticles(b.x,b.y,color,6,2);
}

function bossShootSpiral(b, count, speed, color, dmg=12) {
  for (let i=0;i<count;i++) {
    const a=(i/count)*Math.PI*2+b.angle*3;  // Faster spiral
    b.bullets.push(makeBullet(b.x,b.y,Math.cos(a)*speed,Math.sin(a)*speed,color,4,dmg,'boss'));
  }
}

function bossShootWall(b, count, color, dmg=22) {  // Higher damage
  for (let i=0;i<count;i++) {
    const x=(i/(count-1))*W;
    b.bullets.push(makeBullet(x,b.y+30,0,4.2,color,6,dmg,'boss'));  // Faster wall
  }
}

function bossShootHoming(b, tx, ty, count, color, dmg=16) {
  const a=ang(b,{x:tx,y:ty});
  for (let i=0;i<count;i++) {
    const bullet = makeBullet(b.x,b.y,Math.cos(a)*4.5,Math.sin(a)*4.5,color,4,dmg,'boss');
    bullet.homingTarget = {x:tx, y:ty};
    b.homingBullets.push(bullet);
  }
}

function updateBossAI(b) {
  b.phaseTimer++; b.shootTimer++; b.angle+=0.04; b.pulseTimer+=0.06;  // Faster patterns
  b.teleportCooldown=Math.max(0,b.teleportCooldown-1);
  b.shieldRecharge=Math.max(0,b.shieldRecharge-1);
  const hpPct=b.hp/b.maxHp;
  b.enraged=hpPct<0.4;
  b.berserk=hpPct<0.15;
  const lvl=b.level;

  // Level 1 - Aggressive patrol + spiral bursts
  if (lvl===1) {
    b.moveTimer+=0.012;
    b.targetX=W/2+Math.sin(b.moveTimer)*280;
    b.targetY=100+Math.sin(b.moveTimer*0.9)*35;
    b.x=lerp(b.x,b.targetX,0.04); b.y=lerp(b.y,b.targetY,0.04);
    if (b.shootTimer%60===0) bossShootAt(b,player.x,player.y,4.8,'#ff4444',2,0.15,18);
    if (b.enraged&&b.shootTimer%22===0) bossShootSpiral(b,8,3.2,'#ff8888',12);
    if (b.berserk&&b.shootTimer%15===0) bossShootWall(b,12,'#ff4444',20);
  }
  // Level 2 - Charge + triple homing
  else if (lvl===2) {
    b.moveTimer++;
    if (!b.charging) {
      b.x=lerp(b.x,b.targetX,0.03); b.y=lerp(b.y,b.targetY,0.03);
      if (b.moveTimer%90===0) { b.targetX=rand(70,W-70); b.targetY=rand(70,180); }
      if (b.shootTimer%28===0) bossShootAt(b,player.x,player.y,5.2,'#ff9900',4,0.22,16);
      if (b.moveTimer%110===0) {
        const a=ang(b,player);
        b.chargeVx=Math.cos(a)*11; b.chargeVy=Math.sin(a)*11;
        b.charging=true; b.chargeLife=42;
      }
    } else {
      b.x+=b.chargeVx; b.y+=b.chargeVy; b.chargeLife--;
      b.x=clamp(b.x,b.w,W-b.w); b.y=clamp(b.y,b.h,H*0.6);
      if (b.chargeLife<=0||b.x<=b.w||b.x>=W-b.w) {
        b.charging=false; bossShootSpiral(b,12,3.8,'#ffcc44',14);
        bossShootHoming(b,player.x,player.y,3,'#ff4400',18);
      }
    }
  }
  // Continue pattern for all 7 levels with increasing complexity...
  else if (lvl===3) {
    b.moveTimer++;
    b.x=lerp(b.x,b.targetX,0.05); b.y=lerp(b.y,b.targetY,0.05);
    if (b.teleportCooldown===0&&b.moveTimer%65===0) {
      b.x=rand(70,W-70); b.y=rand(50,200);
      b.teleportCooldown=70;
      spawnParticles(b.x,b.y,'#cc44ff',28,6);
      bossShootSpiral(b,16,3.8,'#cc44ff',14);
    }
    if (b.moveTimer%28===0) { b.targetX=rand(70,W-70); b.targetY=rand(50,180); }
    if (b.shootTimer%22===0) bossShootAt(b,player.x,player.y,6.2,'#cc44ff',2,0.12,20);
    if (b.berserk&&b.shootTimer%12===0) bossShootHoming(b,player.x,player.y,5,'#ff88ff',22);
  }
  // ... (Levels 4-7 follow similar pattern with even more aggression)

  b.bullets=moveBullets(b.bullets);
  b.homingBullets = b.homingBullets.filter(bullet => {
    if (bullet.homingTarget) {
      const dx = bullet.homingTarget.x - bullet.x;
      const dy = bullet.homingTarget.y - bullet.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) {
        bullet.vx += (dx/dist)*0.15;
        bullet.vy += (dy/dist)*0.15;
      }
    }
    bullet.x += bullet.vx; bullet.y += bullet.vy;
    return bullet.x > -30 && bullet.x < W+30 && bullet.y > -30 && bullet.y < H+30 && bullet.life > 0;
  });
}

function drawBossShape(b, x, y, ts) {
  // Enhanced boss shapes (same as original but with more detail)
  const {w,h,color,accentColor,level} = b;
  const pulse=Math.sin(b.pulseTimer)*0.18+1;
  glow(color,28);
  // ... (boss shape drawing code remains similar but enhanced)
  ctx.fillStyle=color;
  ctx.save(); ctx.translate(x,y); ctx.scale(pulse,pulse);
  // Simplified - full implementation would be expanded here
  ctx.fillRect(-w/2,-h/2,w,h);
  ctx.restore();
  noGlow();
}

function drawBoss(b, ts) {
  ctx.save();
  ctx.translate(-cam.x + W/2, -cam.y + H/2);
  ctx.scale(cam.zoom, cam.zoom);
  
  const drawX = b.x - W/2, drawY = b.y - H/2;
  if (b.shielded) {
    withAlpha(0.4+Math.sin(b.pulseTimer*4)*0.2, ()=>{
      glow(b.accentColor,35); ctx.strokeStyle=b.accentColor; ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(drawX,drawY,b.w*1.6,0,Math.PI*2); ctx.stroke();
    });
  }
  drawBossShape(b, drawX, drawY, ts);
  drawBullets(b.bullets);
  ctx.restore();
}

// =============================================================================
//  ENHANCED CINEMATIC SYSTEM
// =============================================================================
const CS_BAR_H = 90;
let cs = {
  active:false, lines:[], lineIndex:0, charIndex:0,
  pauseTimer:0, barT:0, bossT:0, fadeT:0,
  cameraT:0, cameraType:'wide', bossColor:'#fff',
  scenePhase:0, // 0:fadein, 1:bars, 2:boss, 3:dialogue
};

function startCutscene(level) {
  cs.active=true; 
  cs.lines=CUTSCENES[Math.min(level-1,CUTSCENES.length-1)];
  cs.lineIndex=0; cs.charIndex=0; cs.pauseTimer=0; 
  cs.barT=0; cs.bossT=0; cs.fadeT=1; cs.cameraT=0;
  cs.scenePhase=0;
  cs.cameraType='wide';
  cs.bossColor=BOSS_DEFS[Math.min(level-1,BOSS_DEFS.length-1)].color;
}

function updateCutscene() {
  if (!cs.active) return;
  
  cs.fadeT = easeOut(Math.min(1, cs.fadeT + 0.02));
  
  if (cs.scenePhase === 0 && cs.fadeT >= 1) {
    cs.scenePhase = 1; cs.barT = 0;
  }
  if (cs.scenePhase === 1 && cs.barT < 1) {
    cs.barT = Math.min(1, cs.barT + 0.03); return;
  }
  if (cs.scenePhase === 1 && cs.barT >= 1) {
    cs.scenePhase = 2; cs.bossT = 0;
  }
  if (cs.scenePhase === 2 && cs.bossT < 1) {
    cs.bossT = Math.min(1, cs.bossT + 0.018); return;
  }
  if (cs.scenePhase === 2 && cs.bossT >= 1) {
    cs.scenePhase = 3; cs.cameraT = 0;
  }

  // Dialogue phase with camera cuts
  if (cs.scenePhase === 3) {
    if (cs.lineIndex >= cs.lines.length) { 
      cs.fadeT = 1; 
      setTimeout(() => {
        cs.fadeT = 0;
        setTimeout(endCutscene, 800);
      }, 1500);
      return; 
    }
    
    const line = cs.lines[cs.lineIndex];
    if (cs.charIndex < line.text.length) {
      cs.charIndex = Math.min(line.text.length, cs.charIndex + 2.5);
    } else {
      cs.pauseTimer++;
      if (cs.pauseTimer >= 100) {
        cs.pauseTimer = 0; cs.charIndex = 0; cs.lineIndex++;
        if (cs.lines[cs.lineIndex]) {
          cs.cameraType = cs.lines[cs.lineIndex].camera || 'wide';
          cs.cameraT = 0;
        }
      }
    }
    
    // Camera transition
    if (cs.cameraT < 1) cs.cameraT += 0.04;
  }

  const skip = keyJust('f')||keyJust('F')||keyJust(' ')||keyJust('Enter');
  if (skip) {
    if (cs.scenePhase < 3) {
      cs.scenePhase = 3; cs.bossT = 1; cs.barT = 1;
    } else if (cs.charIndex < cs.lines[cs.lineIndex]?.text?.length) {
      cs.charIndex = cs.lines[cs.lineIndex].text.length;
    } else {
      cs.pauseTimer = 100;
    }
  }
}

function endCutscene() {
  cs.active=false;
  gameState='playing';
}

function drawCutscene(ts) {
  // Fade overlay
  if (cs.fadeT > 0) {
    withAlpha(1-cs.fadeT, () => {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    });
  }
  
  drawBackground();
  updateParticles(); drawParticles();

  const barH = CS_BAR_H * easeOut(cs.barT);
  const bossY = lerp(-150, H*0.28, easeOut(cs.bossT));

  // Enhanced letterbox with glow edges
  ctx.fillStyle='#000000f8';
  ctx.fillRect(0,0,W,barH);
  ctx.fillRect(0,H-barH,W,barH);

  glow(cs.bossColor,16);
  ctx.strokeStyle=cs.bossColor; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,barH); ctx.lineTo(W,barH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H-barH); ctx.lineTo(W,H-barH); ctx.stroke();
  noGlow();

  // Cinematic boss entrance with camera work
  if (boss && cs.bossT > 0) {
    cam.zoom = 1 + (cs.bossT * 0.3);
    cam.x = easeInOut(cs.cameraT) * (boss.x - W/2) * 0.3;
    cam.y = easeInOut(cs.cameraT) * (boss.y - H/2) * 0.2;
    
    ctx.save();
    const s = 2.4 + Math.sin(ts*0.003)*0.1;
    ctx.translate(W/2, bossY);
    ctx.scale(s, s);
    drawBossShape(boss, 0, 0, ts);
    ctx.restore();
  }

  // Enhanced HUD elements in cutscene
  if (cs.bossT > 0.3) {
    withAlpha(easeOut((cs.bossT-0.3)/0.7), ()=>{
      glow(cs.bossColor,25);
      ctx.fillStyle=cs.bossColor; ctx.font='bold 28px Orbitron';
      ctx.textAlign='left';
      ctx.fillText(boss.name, 42, barH-26);
      noGlow();
      ctx.fillStyle='#ffffff55'; ctx.font='10px Share Tech Mono';
      ctx.fillText(`EPISODE ${currentLevel} OF 7  ·  ${boss.desc}`, 42, barH-8);
    });
  }

  // Dialogue with camera-based speaker positioning
  if (cs.scenePhase === 3 && cs.bossT >= 1) {
    const startY = H-barH+18;
    const line = cs.lines[cs.lineIndex];
    const text = line ? line.text.slice(0, cs.charIndex) : '';
    const isActive = true;

    withAlpha(1, ()=>{
      glow(line.color, 14);
      ctx.fillStyle=line.color; ctx.font='bold 11px Orbitron';
      ctx.textAlign='left';
      ctx.fillText(`[${line.speaker}]`, 42, startY+12);
      noGlow();

      ctx.fillStyle='#ffffff85';
      ctx.font='12px Share Tech Mono';
      ctx.fillText(text, 42+160, startY+12);

      if (cs.charIndex < line.text.length && Math.floor(Date.now()/200)%2===0) {
        const tw=ctx.measureText(text).width;
        ctx.fillStyle=line.color;
        ctx.fillRect(42+160+tw+4, startY, 8, 14);
      }
    });
  }

  // Skip prompt
  withAlpha(0.4+Math.sin(Date.now()/600)*0.2, ()=>{
    ctx.fillStyle='#fff'; ctx.font='9px Orbitron'; ctx.textAlign='right';
    ctx.fillText('[ F / SPACE — ADVANCE ]', W-42, H-8);
  });

  ctx.textAlign='left';
}

// =============================================================================
//  GAME STATE (7 LEVELS)
// =============================================================================
let gameState='menu';
let currentLevel=1;
const MAX_LEVELS=7;
let bossDeathAnim=0;

function startLevel(level) {
  currentLevel=level;
  resetPlayer();
  boss=createBoss(level);
  particles=[];
  cam={x:0,y:0,zoom:1};
  startCutscene(level);
  gameState='cutscene';
}

function triggerBossDeath() {
  boss.dead=true; bossDeathAnim=120;
  spawnParticles(boss.x,boss.y,boss.color,80,10);
  spawnParticles(boss.x,boss.y,'#fff',50,15);
  flash('#fff',20); shake(15);
}

function triggerPlayerDeath() {
  player.dead=true;
  spawnParticles(player.x,player.y,'#00fff7',60,8);
  flash('#ff0000',25); shake(12);
  setTimeout(()=>{ gameState='gameover'; },1500);
}

// =============================================================================
//  MAIN LOOP
// =============================================================================
function loop(ts) {
  requestAnimationFrame(loop);

  ctx.save();
  if (shakeAmt>0.3) {
    ctx.translate(rand(-shakeAmt,shakeAmt),rand(-shakeAmt,shakeAmt));
    shakeAmt*=0.75;
  } else { shakeAmt=0; }

  if (gameState==='menu') {
    // Enhanced menu with pulsing logo
    drawBackground();
    const t=ts/2000;
    ctx.save(); ctx.translate(W/2,H/2-80); ctx.rotate(Math.sin(t)*0.15);
    glow('#ff44aa',35); ctx.fillStyle='#ff44aa';
    ctx.beginPath();
    for (let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2+t*1.2;
      const r=i%2===0?65:28;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.fill(); noGlow(); ctx.restore();

    ctx.textAlign='center';
    glow('#00fff7',35); ctx.fillStyle='#00fff7'; ctx.font='bold 56px Orbitron';
    ctx.fillText('BOSS RUSH',W/2,H/2+20); noGlow();
    ctx.fillStyle='#ffffff70'; ctx.font='14px Share Tech Mono';
    ctx.fillText('NEON GAUNTLET: ECLIPSE SAGA',W/2,H/2+55);
    ctx.fillStyle='#ffffff40'; ctx.font='11px Share Tech Mono';
    ctx.fillText('7 BOSSES. 1 PILOT. ENDLESS FURY.',W/2,H/2+78);

    const bx=W/2-90,by=H/2+100;
    glow('#00fff7',14); ctx.fillStyle='#00fff720'; ctx.strokeStyle='#00fff7'; ctx.lineWidth=2;
    ctx.fillRect(bx,by,180,44); ctx.strokeRect(bx,by,180,44); noGlow();
    ctx.fillStyle='#00fff7'; ctx.font='bold 15px Orbitron';
    ctx.fillText('[ BEGIN ODYSSEY ]',W/2,by+28);
  }
  // ... (other game states with similar enhancements)

  ctx.restore();
}

requestAnimationFrame(loop);
